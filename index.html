body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;background:var(--bg);background-attachment:fixed;color:var(--text);transition:background 0.4s,color 0.3s}
[lang="ar"]{font-family:'Noto Sans Arabic','Plus Jakarta Sans',system-ui,sans-serif}
::placeholder{color:var(--text-w)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:4px}::-webkit-scrollbar-track{background:transparent}
input:focus{outline:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes waPulse{0%,100%{box-shadow:0 0 16px rgba(37,211,102,0.4)}50%{box-shadow:0 0 28px rgba(37,211,102,0.6)}}
.fade-in{animation:fadeIn 0.3s ease-out both}

.lh-header{width:100%;position:sticky;top:0;z-index:100;background:var(--hdr-bg);backdrop-filter:var(--blur-s);-webkit-backdrop-filter:var(--blur-s);border-bottom:1px solid var(--hdr-border);box-shadow:0 4px 30px var(--shadow-l);transition:background 0.3s}
.lh-header-inner{max-width:740px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:8px 12px 4px;gap:8px}
.logo-link{flex:1;display:flex}
.logo-link img{width:100%;max-width:100%;height:auto}
.hdr-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
.call-btn{display:flex;align-items:center;gap:4px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;white-space:nowrap;transition:all 0.15s}
.call-btn:hover{opacity:0.9}
.mode-btn,.lang-btn{width:34px;height:34px;border-radius:10px;background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--glass-border);color:var(--text-s);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:16px;padding:0}
.mode-btn:hover,.lang-btn:hover{background:var(--glass-s);color:var(--text)}
.lang-btn{font-size:11px;font-weight:800;font-family:'Noto Sans Arabic',sans-serif;width:auto;padding:0 10px}

.dos-title{max-width:740px;margin:0 auto;padding:8px 16px 0;text-align:center}
.dos-title h1{font-size:12px;font-weight:700;color:var(--text-s);letter-spacing:2.5px;text-transform:uppercase}
.search-bar{padding:8px 16px 10px;border-bottom:1px solid var(--cell-border)}
.search-inner{max-width:740px;margin:0 auto;position:relative}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);pointer-events:none;display:flex;color:var(--text-w)}
[dir="rtl"] .search-icon{left:auto;right:16px}
.search-input{width:100%;padding:14px 44px 14px 48px;border-radius:14px;border:1.5px solid var(--input-border);background:var(--input-bg);backdrop-filter:var(--blur);color:var(--text);font-size:15px;font-family:inherit;transition:all 0.2s}
[dir="rtl"] .search-input{padding:14px 48px 14px 44px}
.search-input:focus{border-color:var(--input-focus)!important;box-shadow:0 0 20px rgba(192,39,45,0.08)!important}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--glass);border:none;border-radius:8px;width:30px;height:30px;display:none;align-items:center;justify-content:center;color:var(--text-w);cursor:pointer}
[dir="rtl"] .search-clear{right:auto;left:12px}
.search-clear.visible{display:flex}

.az-wrap{max-width:740px;margin:0 auto;padding:8px 8px 4px}
.az-bar{display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.az-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--az-bd);font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.12s;display:flex;align-items:center;justify-content:center;background:var(--az-bg);color:var(--az-fg)}
.az-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bg)}
.az-btn.active{background:var(--accent-g);color:#fff;border-color:var(--accent);box-shadow:0 0 12px rgba(192,39,45,0.25);transform:scale(1.08)}
.az-btn.disabled{opacity:0.2;cursor:default;pointer-events:none}

.legend-wrap{max-width:740px;margin:0 auto;padding:6px 12px 2px}
.legend-bar{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.lg-btn{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--text-w);cursor:pointer;padding:4px 8px;border-radius:8px;border:1px solid transparent;background:none;font-family:inherit;transition:all 0.15s}
.lg-btn:hover{background:var(--glass);color:var(--text-s)}
.lg-btn.active{border-color:var(--glass-border-h);background:var(--glass-s);color:var(--text);font-weight:700}
.tube-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(128,128,128,0.25);flex-shrink:0;box-shadow:inset 0 -2px 4px rgba(0,0,0,0.12)}

.toolbar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 2px;max-width:740px;margin:0 auto}
.result-count{font-size:12px;font-weight:700;color:var(--text-w)}
.tool-right{display:flex;align-items:center;gap:6px}
.sync-info{font-size:11px;color:var(--text-w);display:flex;align-items:center;gap:4px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block;box-shadow:0 0 6px rgba(26,188,156,0.4)}
.ref-btn{color:var(--text-w);cursor:pointer;background:none;border:none;padding:4px;border-radius:6px;display:flex;align-items:center}
.ref-btn:hover{color:var(--text);background:var(--glass)}
.ref-btn.spinning svg{animation:spin 0.8s linear infinite}

.letter-group{max-width:740px;margin:0 auto;padding:0 12px}
.letter-anchor{padding:10px 16px 4px;display:flex;align-items:baseline;gap:8px}
.letter-label{font-size:28px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace;opacity:0.8}
.letter-count{font-size:11px;color:var(--text-w);font-weight:600}

.tc{border-radius:16px;margin:0 12px 8px;overflow:hidden;transition:all 0.2s;background:var(--card-bg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);box-shadow:0 2px 16px var(--shadow)}
.tc:hover{border-color:var(--glass-border-h);background:var(--card-hover)}
.tc.open{border-color:var(--card-open-border);box-shadow:0 4px 30px rgba(192,39,45,0.08);background:var(--card-hover)}
.ch{padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cr1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.tn{font-size:14.5px;font-weight:700;color:var(--text-b);line-height:1.35;flex:1}
.chev{flex-shrink:0;transition:transform 0.2s;color:var(--text-w)}
.tc.open .chev{transform:rotate(180deg);color:var(--accent)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}
.cp{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid;line-height:18px}
.cp-id{font-family:'JetBrains Mono',monospace;background:var(--chip-id-bg);color:var(--chip-id-fg);border-color:var(--chip-id-bd);letter-spacing:0.3px}
.cp-cpt{font-family:'JetBrains Mono',monospace;background:var(--chip-cpt-bg);color:var(--chip-cpt-fg);border-color:var(--chip-cpt-bd)}
.sample-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;line-height:18px;border:1px solid var(--sample-bd);background:var(--sample-bg);color:var(--sample-fg)}
.tube-sm{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(128,128,128,0.2);flex-shrink:0}
.tat-p{font-size:11.5px;color:var(--text-w);margin-top:6px;font-weight:500}

.cd{animation:fadeIn 0.25s ease-out}
.dw{padding:0 16px 8px}
.dt{font-size:13px;color:var(--text-s);line-height:1.6;background:var(--cell-bg);padding:10px 14px;border-radius:12px;border:1px solid var(--cell-border)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px 16px 14px}
.dc{padding:10px 12px;border-radius:10px;background:var(--cell-bg);border:1px solid var(--cell-border)}
.dc.w{grid-column:1/-1}
.dl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-w);margin-bottom:4px}
.dv{font-size:13px;font-weight:600;color:var(--text);line-height:1.4}
.copy-row{padding:0 16px 14px;display:flex}
.copy-btn{flex:1;padding:10px;border-radius:10px;font-size:11.5px;font-weight:700;font-family:inherit;cursor:pointer;border:1px solid var(--glass-border);background:var(--glass);color:var(--text-s);transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.copy-btn:hover{background:var(--glass-s);color:var(--text)}
.copy-btn.copied{background:var(--teal-bg);border-color:var(--teal-border);color:var(--teal)}
.es{text-align:center;padding:50px 20px}
.es-cta{margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.es-cta a{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;font-family:inherit;transition:all 0.15s}
.es-wa{background:#25D366;color:#fff}
.es-ph{background:var(--glass);color:var(--text-s);border:1px solid var(--glass-border)}
.show-more{max-width:740px;margin:0 auto;padding:8px 24px 16px;text-align:center}
.show-more button{padding:12px 32px;border-radius:12px;background:var(--glass);color:var(--text-s);border:1px solid var(--glass-border);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;backdrop-filter:var(--blur)}
.show-more button:hover{background:var(--glass-s);color:var(--text)}

.btt{position:fixed;bottom:90px;right:20px;width:42px;height:42px;border-radius:12px;background:var(--accent);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(192,39,45,0.3);z-index:80}
[dir="rtl"] .btt{right:auto;left:20px}
.btt.show{display:flex}
.wa-float{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:#25D366;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:80;animation:waPulse 2.5s ease-in-out infinite;text-decoration:none}
[dir="rtl"] .wa-float{right:auto;left:20px}
[dir="rtl"] .btt{right:auto;left:20px}

.disc-section{max-width:740px;margin:0 auto;padding:16px 12px 8px}
.disc-box{border-radius:16px;padding:20px;font-size:11.5px;color:var(--text-w);line-height:1.7;background:var(--disc-bg);backdrop-filter:var(--blur);border:1px solid var(--glass-border)}
.disc-box h4{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-s);margin-bottom:6px}
.disc-hr{border:none;border-top:1px solid var(--cell-border);margin:14px 0}
.eco-badge{display:inline-flex;align-items:center;gap:6px;background:var(--teal-bg);color:var(--teal);padding:5px 12px;border-radius:8px;font-weight:700;font-size:11px;border:1px solid var(--teal-border);margin-bottom:8px}
.lh-footer-wrap{max-width:740px;margin:16px auto 0;padding:0 12px}
.lh-footer-wrap img{width:100%;height:auto;display:block;border-radius:12px;opacity:var(--footer-opacity)}
.ft{text-align:center;padding:12px 16px 32px}
.ft-m{font-size:10px;color:var(--text-w);line-height:1.6;opacity:0.6}

.ls{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0A1628,#0F3460,#1ABC9C)}
.li{text-align:center;padding:40px}
.ls-logo{width:260px;max-width:80vw;height:auto;margin:0 auto 24px;display:block;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.3))}
.lb{width:120px;height:2px;border-radius:4px;margin:0 auto;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);background-size:200% 100%;animation:shimmer 1.5s infinite linear}
.err{min-height:100vh;display:flex;align-items:center;justify-content:center}
.rbtn{padding:10px 28px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
@media(max-width:480px){.dg{grid-template-columns:1fr}.dc.w{grid-column:auto}.az-btn{width:26px;height:26px;font-size:10px}.call-btn span{display:none}.call-btn{padding:8px 10px}.hdr-btns{gap:4px}}
</style>
</head>
