<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;
  background:linear-gradient(160deg,#E8EDF5 0%,#DBEAFE 25%,#EDE9FE 50%,#E0F2FE 75%,#ECFDF5 100%);
  background-attachment:fixed;color:#1E293B}
::placeholder{color:#94A3B8}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.4);border-radius:4px}
input:focus{outline:none;border-color:#C0272D!important;box-shadow:0 0 0 3px rgba(192,39,45,0.08)!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes waPulse{0%,100%{box-shadow:0 4px 16px rgba(37,211,102,0.35)}50%{box-shadow:0 4px 28px rgba(37,211,102,0.6)}}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 4px 12px rgba(192,39,45,0.15))}50%{filter:drop-shadow(0 8px 24px rgba(192,39,45,0.3))}}
@keyframes dotBounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.fade-in{animation:fadeIn 0.3s ease-out both}

/* GLASS */
.g{background:rgba(255,255,255,0.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.6);box-shadow:0 4px 24px rgba(0,0,0,0.04)}
.gs{background:rgba(255,255,255,0.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.7)}

/* HEADER */
.lh-header{width:100%;position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(226,232,240,0.6);box-shadow:0 1px 12px rgba(0,0,0,0.04)}
.lh-header-inner{max-width:740px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:8px 12px 4px;gap:8px}
.logo-link{flex:1;display:flex}
.logo-link img{width:100%;max-width:100%;height:auto}
.call-btn{display:flex;align-items:center;gap:4px;background:#C0272D;color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:all 0.15s;box-shadow:0 2px 8px rgba(192,39,45,0.2)}
.call-btn:hover{background:#a02025;box-shadow:0 4px 12px rgba(192,39,45,0.3)}

.dos-title{max-width:740px;margin:0 auto;padding:8px 16px 0;text-align:center}
.dos-title h1{font-size:12px;font-weight:700;color:#64748B;letter-spacing:2.5px;text-transform:uppercase}

.search-bar{padding:8px 16px 10px;border-bottom:1px solid rgba(226,232,240,0.4)}
.search-inner{max-width:740px;margin:0 auto;position:relative}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);pointer-events:none;display:flex;color:#94A3B8}
.search-input{width:100%;padding:14px 44px 14px 48px;border-radius:14px;border:1.5px solid rgba(226,232,240,0.8);background:rgba(255,255,255,0.6);backdrop-filter:blur(12px);color:#1E293B;font-size:15px;font-family:inherit;transition:all 0.2s}
.search-input:focus{background:rgba(255,255,255,0.85);box-shadow:0 0 0 3px rgba(192,39,45,0.08)!important}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(241,245,249,0.8);border:none;border-radius:8px;width:30px;height:30px;display:none;align-items:center;justify-content:center;color:#64748B;cursor:pointer}
.search-clear.visible{display:flex}
.search-clear:hover{background:#E2E8F0}

/* A-Z */
.az-wrap{max-width:740px;margin:0 auto;padding:8px 8px 4px}
.az-bar{display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.az-btn{width:30px;height:30px;border-radius:8px;border:1px solid rgba(226,232,240,0.6);font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.5);color:#475569;backdrop-filter:blur(8px)}
.az-btn:hover{background:rgba(254,242,242,0.8);color:#C0272D;border-color:rgba(192,39,45,0.2)}
.az-btn.active{background:#C0272D;color:#fff;border-color:#C0272D;box-shadow:0 2px 10px rgba(192,39,45,0.3);transform:scale(1.08)}
.az-btn.disabled{opacity:0.25;cursor:default;pointer-events:none}

/* LEGEND - MUCH MORE VISIBLE */
.legend-wrap{max-width:740px;margin:0 auto;padding:6px 12px 2px}
.legend-bar{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.lg-btn{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:#64748B;cursor:pointer;padding:5px 10px;border-radius:8px;border:1.5px solid rgba(226,232,240,0.6);background:rgba(255,255,255,0.5);font-family:inherit;transition:all 0.15s;backdrop-filter:blur(6px)}
.lg-btn:hover{background:rgba(255,255,255,0.8);border-color:#CBD5E1;color:#334155}
.lg-btn.active{background:#C0272D!important;color:#fff!important;border-color:#C0272D!important;box-shadow:0 2px 10px rgba(192,39,45,0.25);font-weight:700;transform:scale(1.03)}
.lg-btn.active .tube-dot{border-color:rgba(255,255,255,0.6)!important}
.tube-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(0,0,0,0.1);flex-shrink:0;box-shadow:inset 0 -2px 3px rgba(0,0,0,0.1)}

.toolbar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 2px;max-width:740px;margin:0 auto}
.result-count{font-size:12px;font-weight:700;color:#94A3B8}
.tool-right{display:flex;align-items:center;gap:6px}
.sync-info{font-size:11px;color:#94A3B8;display:flex;align-items:center;gap:4px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#10B981;display:inline-block;box-shadow:0 0 6px rgba(16,185,129,0.4)}
.ref-btn{color:#94A3B8;cursor:pointer;background:none;border:none;padding:4px;border-radius:6px;display:flex;align-items:center}
.ref-btn:hover{color:#C0272D;background:rgba(254,242,242,0.6)}
.ref-btn.spinning svg{animation:spin 0.8s linear infinite}

.letter-group{max-width:740px;margin:0 auto;padding:0 12px}
.letter-anchor{padding:10px 16px 4px;display:flex;align-items:baseline;gap:8px}
.letter-label{font-size:28px;font-weight:800;color:#C0272D;font-family:'JetBrains Mono',monospace}
.letter-count{font-size:11px;color:#CBD5E1;font-weight:600}

/* CARDS - LIGHT GLASS */
.tc{border-radius:16px;margin:0 12px 8px;overflow:hidden;transition:all 0.2s;
  background:rgba(255,255,255,0.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.7);box-shadow:0 2px 12px rgba(0,0,0,0.03)}
.tc:hover{background:rgba(255,255,255,0.7);box-shadow:0 4px 20px rgba(0,0,0,0.06);border-color:rgba(226,232,240,0.8)}
.tc.open{border-color:rgba(192,39,45,0.25);box-shadow:0 4px 24px rgba(192,39,45,0.08);background:rgba(255,255,255,0.75)}
.ch{padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cr1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.tn{font-size:14.5px;font-weight:700;color:#0F172A;line-height:1.35;flex:1}
.chev{flex-shrink:0;transition:transform 0.2s;color:#CBD5E1}
.tc.open .chev{transform:rotate(180deg);color:#C0272D}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}
.cp{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid;line-height:18px}
.cp-id{font-family:'JetBrains Mono',monospace;background:#FEF2F2;color:#991B1B;border-color:#FECACA;letter-spacing:0.3px}
.cp-cpt{font-family:'JetBrains Mono',monospace;background:#F0F9FF;color:#0369A1;border-color:#BAE6FD}
.sample-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;line-height:18px;border:1px solid rgba(226,232,240,0.8);background:rgba(241,245,249,0.8);color:#475569}
.tube-sm{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.1);flex-shrink:0}
.tat-p{font-size:11.5px;color:#94A3B8;margin-top:6px;font-weight:500}

.cd{animation:fadeIn 0.25s ease-out}
.dw{padding:0 16px 8px}
.dt{font-size:13px;color:#475569;line-height:1.6;background:rgba(248,250,252,0.8);padding:10px 14px;border-radius:12px;border:1px solid rgba(226,232,240,0.6)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px 16px 14px}
.dc{padding:10px 12px;border-radius:10px;background:rgba(248,250,252,0.8);border:1px solid rgba(226,232,240,0.5)}
.dc.w{grid-column:1/-1}
.dl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#94A3B8;margin-bottom:4px}
.dv{font-size:13px;font-weight:600;color:#1E293B;line-height:1.4}
.copy-row{padding:0 16px 14px;display:flex}
.copy-btn{flex:1;padding:10px;border-radius:10px;font-size:11.5px;font-weight:700;font-family:inherit;cursor:pointer;border:1.5px solid rgba(226,232,240,0.8);background:rgba(255,255,255,0.6);color:#64748B;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:5px;backdrop-filter:blur(8px)}
.copy-btn:hover{background:rgba(254,242,242,0.8);border-color:rgba(192,39,45,0.2);color:#C0272D}
.copy-btn.copied{background:rgba(209,250,229,0.8);border-color:#86EFAC;color:#065F46}

.es{text-align:center;padding:50px 20px}
.es-cta{margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.es-cta a{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;font-family:inherit;transition:all 0.15s}
.es-wa{background:#25D366;color:#fff;box-shadow:0 2px 8px rgba(37,211,102,0.25)}
.es-ph{background:rgba(255,255,255,0.6);color:#475569;border:1px solid rgba(226,232,240,0.8);backdrop-filter:blur(8px)}

.show-more{max-width:740px;margin:0 auto;padding:8px 24px 16px;text-align:center}
.show-more button{padding:12px 32px;border-radius:12px;background:rgba(255,255,255,0.6);color:#64748B;border:1.5px solid rgba(226,232,240,0.8);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;backdrop-filter:blur(12px)}
.show-more button:hover{background:rgba(255,255,255,0.85);color:#C0272D;border-color:rgba(192,39,45,0.2)}

.btt{position:fixed;bottom:90px;right:20px;width:42px;height:42px;border-radius:12px;background:#C0272D;color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(192,39,45,0.3);z-index:80}
.btt.show{display:flex}
.wa-float{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:#25D366;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:80;animation:waPulse 2.5s ease-in-out infinite;text-decoration:none}

.disc-section{max-width:740px;margin:0 auto;padding:16px 12px 8px}
.disc-box{border-radius:16px;padding:20px;font-size:11.5px;color:#64748B;line-height:1.7;background:rgba(255,255,255,0.55);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.6)}
.disc-box h4{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:#475569;margin-bottom:6px}
.disc-hr{border:none;border-top:1px solid rgba(226,232,240,0.5);margin:14px 0}
.eco-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(209,250,229,0.6);color:#065F46;padding:5px 12px;border-radius:8px;font-weight:700;font-size:11px;border:1px solid rgba(134,239,172,0.4);margin-bottom:8px}
.lh-footer-wrap{max-width:740px;margin:16px auto 0;padding:0 12px}
.lh-footer-wrap img{width:100%;height:auto;display:block;border-radius:12px}
.ft{text-align:center;padding:12px 16px 32px}
.ft-m{font-size:10px;color:#CBD5E1;line-height:1.6}

/* LOADING SCREEN */
.ls{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#E8EDF5,#DBEAFE,#EDE9FE,#E0F2FE)}
.li{text-align:center;padding:30px}
.ls-logo{width:280px;max-width:80vw;height:auto;margin:0 auto 20px;display:block;animation:logoFloat 3s ease-in-out infinite,logoPulse 3s ease-in-out infinite}
.loading-dots{display:flex;gap:6px;justify-content:center;margin-top:8px}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:#C0272D;display:inline-block;animation:dotBounce 1.4s infinite ease-in-out both}
.loading-dots span:nth-child(1){animation-delay:-.32s}
.loading-dots span:nth-child(2){animation-delay:-.16s}
.loading-dots span:nth-child(3){animation-delay:0s}
.loading-text{font-size:13px;color:#94A3B8;font-weight:600;margin-top:16px;letter-spacing:0.5px}

.err{min-height:100vh;display:flex;align-items:center;justify-content:center}
.rbtn{padding:10px 28px;border-radius:10px;background:#C0272D;color:#fff;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(192,39,45,0.2)}
@media(max-width:480px){.dg{grid-template-columns:1fr}.dc.w{grid-column:auto}.az-btn{width:26px;height:26px;font-size:10px}.call-btn span{display:none}.call-btn{padding:8px 10px}}
